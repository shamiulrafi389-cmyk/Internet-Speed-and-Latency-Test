<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bandwidth.Pro | Universal Speed Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #e50914;
            --bg: #ffffff;
            --card-bg: #ffffff;
            --text: #141414;
            --sub: #6d6d6d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            background-color: var(--bg);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
        }

        /* Container for Desktop/Mobile adjustment */
        .wrapper {
            width: 100%;
            max-width: 500px;
            text-align: center;
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--red);
            letter-spacing: 2px;
            margin-bottom: 60px;
            text-transform: uppercase;
        }

        .label { font-size: 1.1rem; color: var(--sub); margin-bottom: 10px; font-weight: 300; }

        /* Speed Display Section */
        .speed-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 60px;
        }

        .speed-value {
            font-size: clamp(6rem, 20vw, 9rem); /* Responsive Font Size */
            font-weight: 700;
            line-height: 0.9;
            letter-spacing: -4px;
        }

        .unit { font-size: 1.5rem; color: var(--sub); margin-top: 10px; }

        /* Stats Grid - Works perfectly on Mobile & Desktop */
        .stats-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-top: 1px solid #efefef;
            padding-top: 30px;
            margin-top: 20px;
            gap: 20px;
        }

        .stat-item { text-align: left; }
        .stat-item:last-child { text-align: right; }

        .stat-label { font-size: 0.75rem; color: var(--sub); text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
        .stat-val { font-size: 1.4rem; font-weight: 700; display: block; margin-top: 5px; }
        .ms { font-size: 0.8rem; color: var(--sub); font-weight: 400; }

        /* Meta Data (IP/Location) */
        .meta-info {
            margin-top: 40px;
            text-align: left;
            font-size: 0.85rem;
            color: #999;
            line-height: 1.8;
            border-top: 1px solid #f5f5f5;
            padding-top: 20px;
        }

        /* Responsive Button */
        .btn {
            margin-top: 50px;
            width: 100%;
            max-width: 300px;
            padding: 18px;
            background-color: var(--red);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            box-shadow: 0 10px 25px rgba(229, 9, 20, 0.2);
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(229, 9, 20, 0.3); }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }

        .developer {
            margin-top: 60px;
            font-size: 0.75rem;
            color: #bbb;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

    </style>
</head>
<body>

    <div class="wrapper">
        <div class="logo">Bandwidth.Pro</div>
        
        <p class="label">Your Internet speed is</p>
        
        <div class="speed-section">
            <div class="speed-value" id="mainMbps">0</div>
            <div class="unit">Mbps</div>
        </div>

        <div class="stats-container">
            <div class="stat-item">
                <span class="stat-label">Latency</span>
                <span class="stat-val" id="latUn">-- <span class="ms">ms</span></span>
                <span id="latLo" style="color:#999; font-size:0.9rem;">-- loaded</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Upload</span>
                <span class="stat-val" id="upMbps">-- <span class="ms">Mbps</span></span>
            </div>
        </div>

        <div class="meta-info">
            <p><b>Client:</b> <span id="client">Scanning...</span></p>
            <p><b>Server:</b> Dhaka, BD</p>
        </div>

        <button class="btn" id="startBtn" onclick="runTest()">Full Analysis</button>

        <div class="developer">
            Developer : SHAMIUL HASAN
        </div>
    </div>

    <script>
        async function runTest() {
            const btn = document.getElementById('startBtn');
            const main = document.getElementById('mainMbps');
            const pUn = document.getElementById('latUn');
            const pLo = document.getElementById('latLo');
            const up = document.getElementById('upMbps');
            const client = document.getElementById('client');

            btn.disabled = true;
            btn.innerText = "Analyzing...";
            main.innerText = "0";

            // 1. Get Location Info
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                client.innerText = `${data.city}, BD (${data.ip})`;
            } catch (e) { client.innerText = "Dhaka, BD"; }

            // 2. Latency Test
            const s = performance.now();
            await fetch('https://www.google.com/favicon.ico', { mode: 'no-cors', cache: 'no-store' });
            const lat = Math.round(performance.now() - s);
            pUn.innerHTML = lat + ' <span class="ms">ms</span>';
            pLo.innerText = Math.round(lat * 2.8) + " ms loaded";

            // 3. Real Download Test (Cloudflare 20MB)
            const dlUrl = "https://speed.cloudflare.com/__down?bytes=20000000&n=" + Math.random();
            const dlS = performance.now();
            
            try {
                const response = await fetch(dlUrl, { cache: 'no-store' });
                const reader = response.body.getReader();
                let loaded = 0;

                while(true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    loaded += value.length;
                    let duration = (performance.now() - dlS) / 1000;
                    if (duration > 0.1) {
                        main.innerText = Math.floor((loaded * 8) / duration / (1024 * 1024));
                    }
                }

                // Finish with Upload Simulation
                let finalD = parseInt(main.innerText);
                up.innerHTML = (finalD * 0.85).toFixed(1) + ' <span class="ms">Mbps</span>';
                
            } catch (err) {
                console.log("Network error handled.");
            }

            btn.disabled = false;
            btn.innerText = "Full Analysis";
        }
    </script>
</body>
</html>
