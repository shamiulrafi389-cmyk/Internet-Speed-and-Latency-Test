<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigaSpeed Pro | Professional Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f3ff; --purple: #bc13fe; --bg: #05070a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 40px; border-radius: 40px; width: 90%; max-width: 420px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        h1 { font-family: 'Orbitron'; font-size: 1rem; letter-spacing: 3px; color: var(--neon); margin-bottom: 30px; }
        .gauge-area { position: relative; width: 220px; height: 220px; margin: 0 auto 30px; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 4px solid rgba(255,255,255,0.05); border-radius: 50%; box-shadow: inset 0 0 20px rgba(0, 243, 255, 0.05); }
        .speed-num { font-family: 'Orbitron'; font-size: 4.5rem; font-weight: 900; background: linear-gradient(to bottom, #fff, var(--neon)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .unit { font-size: 1rem; color: #64748b; font-weight: 600; letter-spacing: 2px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .stat-box { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-label { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .stat-value { font-family: 'Orbitron'; color: var(--purple); font-size: 1.1rem; }
        button { width: 100%; margin-top: 30px; padding: 18px; border: none; border-radius: 20px; background: linear-gradient(45deg, var(--neon), var(--purple)); color: white; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; letter-spacing: 2px; box-shadow: 0 10px 20px rgba(0, 243, 255, 0.2); transition: 0.3s; }
        button:disabled { opacity: 0.5; filter: grayscale(0.8); }
    </style>
</head>
<body>

    <div class="card">
        <h1>NETWORK DIAGNOSTIC</h1>
        <div class="gauge-area">
            <div class="speed-num" id="speed">0</div>
            <div class="unit">MBPS</div>
        </div>
        <div class="stats-grid">
            <div class="stat-box"><span class="stat-label">Latency</span><span class="stat-value" id="ping">-- ms</span></div>
            <div class="stat-box"><span class="stat-label">Stability</span><span class="stat-value" id="status-text">Ready</span></div>
        </div>
        <button id="testBtn" onclick="runAccuracyTest()">START ANALYSIS</button>
        <p id="status" style="margin-top: 20px; color: #475569; font-size: 0.75rem;">Cloudflare Edge Node Analysis</p>
    </div>

    <script>
        async function runAccuracyTest() {
            const speedEl = document.getElementById('speed');
            const pingEl = document.getElementById('ping');
            const btn = document.getElementById('testBtn');
            const status = document.getElementById('status');
            const statusText = document.getElementById('status-text');

            btn.disabled = true;
            status.innerText = "Connecting to Cloudflare Edge...";
            statusText.innerText = "Scanning...";
            speedEl.innerText = "0";
            
            const pStart = performance.now();
            try {
                // Latency test
                await fetch('https://www.google.com/favicon.ico', { mode: 'no-cors', cache: 'no-store' });
                pingEl.innerText = Math.round(performance.now() - pStart) + " ms";

                // Real Data Download (25MB)
                const testUrl = "https://speed.cloudflare.com/__down?bytes=25000000&n=" + Math.random();
                
                const start = performance.now();
                const response = await fetch(testUrl, { cache: 'no-store' });
                
                if (!response.ok) throw new Error();

                const reader = response.body.getReader();
                let receivedLength = 0;

                while(true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    receivedLength += value.length;
                    
                    let tempDuration = (performance.now() - start) / 1000;
                    if (tempDuration > 0.2) {
                        let currentMbps = ((receivedLength * 8) / tempDuration / (1024 * 1024)).toFixed(1);
                        speedEl.innerText = Math.floor(currentMbps);
                    }
                }

                status.innerText = "Scan Complete (Real Data)";
                statusText.innerText = "Stable";
                btn.disabled = false;

            } catch (err) {
                status.innerText = "Connection Error. Try again.";
                statusText.innerText = "Failed";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
